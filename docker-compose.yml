version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: easytrip
      POSTGRES_PASSWORD: easytrip_dev_password
      POSTGRES_DB: easytrip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easytrip"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: ./apps/core-api
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://easytrip:easytrip_dev_password@postgres:5432/easytrip
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ./apps/ai-service
    ports:
      - "8000:8000"
    environment:
      CORE_API_URL: http://core-api:3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - core-api

volumes:
  postgres_data:
